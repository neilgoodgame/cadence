name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # See lint.yml's "Check for backend changes" step for why this is a
      # step-level filter rather than a `paths:` trigger filter: unit and
      # integration are required status checks, and they need to report on
      # every PR -- even ones that touch neither backend/ nor backend_java/
      # (e.g. this CI config itself) -- or GitHub leaves them permanently
      # "Expected -- waiting for status to be reported".
      - name: Check for backend changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/tests.yml"

      - name: Install uv
        if: steps.filter.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: uv sync --locked

      - name: Run unit tests
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: uv run pytest -m unit -q

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: cadence
          POSTGRES_USER: cadence
          POSTGRES_PASSWORD: cadence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cadence"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Check for backend changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/tests.yml"

      - name: Install uv
        if: steps.filter.outputs.backend == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: uv sync --locked

      # Mirrors entrypoint.sh's one-time keypair generation -- tests that mint
      # or verify JWTs (JWKS, /v1/auth/jwt) need real key files on disk.
      - name: Generate JWT signing keys
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        run: |
          mkdir -p keys
          openssl genrsa -out keys/jwt_private.pem 2048
          openssl rsa -in keys/jwt_private.pem -pubout -out keys/jwt_public.pem

      - name: Run integration tests
        if: steps.filter.outputs.backend == 'true'
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: cadence
          POSTGRES_USER: cadence
          POSTGRES_PASSWORD: cadence
        run: uv run pytest -m integration -q
