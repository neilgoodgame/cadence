name: Java Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # See lint.yml's "Check for backend changes" step for why this is a step-level
      # filter rather than a `paths:` trigger filter: unit and integration are required
      # status checks, and they need to report on every PR -- even ones that touch
      # neither backend/ nor backend_java/ (e.g. this CI config itself) -- or GitHub
      # leaves them permanently "Expected -- waiting for status to be reported".
      - name: Check for backend_java changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend_java:
              - "backend_java/**"
              - ".github/workflows/java-tests.yml"

      - name: Set up Java
        if: steps.filter.outputs.backend_java == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Run unit tests
        if: steps.filter.outputs.backend_java == 'true'
        working-directory: backend_java
        run: ./gradlew unitTest --no-daemon

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for backend_java changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend_java:
              - "backend_java/**"
              - ".github/workflows/java-tests.yml"

      - name: Set up Java
        if: steps.filter.outputs.backend_java == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      # Mirrors entrypoint.sh's one-time keypair generation -- IntegrationTest boots the
      # full Spring context, and JwtKeys reads these files eagerly at startup.
      - name: Generate JWT signing keys
        if: steps.filter.outputs.backend_java == 'true'
        working-directory: backend_java
        run: |
          mkdir -p keys
          openssl genrsa -out keys/jwt_private_pkcs1.pem 2048
          openssl pkcs8 -topk8 -nocrypt -in keys/jwt_private_pkcs1.pem -out keys/jwt_private.pem
          openssl rsa -in keys/jwt_private_pkcs1.pem -pubout -out keys/jwt_public.pem
          rm keys/jwt_private_pkcs1.pem

      # No services: block needed -- IntegrationTest (see support/IntegrationTest.java)
      # starts its own Postgres/TimescaleDB via Testcontainers against the runner's
      # already-running Docker daemon, the same way it does locally.
      - name: Run integration tests
        if: steps.filter.outputs.backend_java == 'true'
        working-directory: backend_java
        run: ./gradlew integrationTest --no-daemon
