name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Catches newly-disclosed vulnerability patterns in code that hasn't changed.
    - cron: "23 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Manual build mode (rather than autobuild) so this compiles with the same JDK
      # toolchain and Gradle wrapper as the actual project, including MapStruct's
      # annotation-processor-generated mapper sources - autobuild's heuristics aren't
      # guaranteed to pick the Java 24 toolchain this project pins.
      - name: Build (Java)
        if: matrix.language == 'java-kotlin'
        working-directory: backend_java
        run: ./gradlew compileJava --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
