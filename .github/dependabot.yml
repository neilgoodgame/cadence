version: 2

updates:
  # Python backend (backend/pyproject.toml + uv.lock - Dependabot's "pip" ecosystem
  # understands uv.lock alongside requirements.txt/pyproject.toml).
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"

  # Java backend (backend_java/build.gradle.kts).
  - package-ecosystem: "gradle"
    directory: "/backend_java"
    schedule:
      interval: "weekly"
    groups:
      java-dependencies:
        patterns:
          - "*"
    ignore:
      # Testcontainers 2.x is a breaking major (artifact coordinates changed);
      # migrate deliberately rather than via an automated bump.
      - dependency-name: "org.testcontainers:*"
        update-types: ["version-update:semver-major"]

  # Frontend (frontend/package.json).
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    ignore:
      # TypeScript 7 is a major; typescript-eslint doesn't support it yet.
      # Remove this ignore once typescript-eslint declares TS 7 peer support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Keep the Actions themselves (checkout, setup-java, setup-uv, codeql-action, ...) current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
