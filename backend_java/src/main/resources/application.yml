server:
  port: 8080

spring:
  application:
    name: cadence-api

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cadence_java}
    username: ${POSTGRES_USER:cadence}
    password: ${POSTGRES_PASSWORD:cadence}

  jackson:
    property-naming-strategy: SNAKE_CASE

  servlet:
    multipart:
      # Must be >= cadence.uploads.max-upload-bytes below - otherwise Tomcat's multipart
      # layer rejects large-but-legitimate files before they ever reach UploadIngestService's
      # own size check, with a generic framework error instead of our typed 413 response.
      max-file-size: 200MB
      max-request-size: 200MB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

cadence:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/jwt_private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:keys/jwt_public.pem}
    kid: ${JWT_KID:801}
    issuer: ${JWT_ISSUER:https://api.cadence.cc}
    audience: ${JWT_AUDIENCE:cadence-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  uploads:
    media-root: ${MEDIA_ROOT:media}
    max-upload-bytes: 209715200
    max-batch-files: 10000
  oauth:
    first-party-client-secret: ${OAUTH_FIRST_PARTY_CLIENT_SECRET:dev-only-secret-change-me}

springdoc:
  swagger-ui:
    path: /schema/docs
  api-docs:
    path: /schema

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.cadence.api: ${CADENCE_LOG_LEVEL:INFO}
