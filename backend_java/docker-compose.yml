services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cadence_java}
      POSTGRES_USER: ${POSTGRES_USER:-cadence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadence}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Offset from the Python stack's 5432 so both can run side by side locally.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cadence}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - jwt_keys:/app/keys
      - media:/app/media
    ports:
      # Offset from the Python stack's 8000.
      - "8080:8080"

volumes:
  postgres_data:
  jwt_keys:
  media:
